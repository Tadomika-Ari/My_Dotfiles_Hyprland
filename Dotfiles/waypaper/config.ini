[Settings]
language = en
backend = linux-wallpaperengine
folder = ~/Wallpaper
monitors = All
wallpaper = ~/.local/share/Steam/steamapps/workshop/content/431960/3685206506/preview.jpg
show_path_in_tooltip = True
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = ln -sf "$wallpaper" "$HOME/.config/rofi/images/imagepseudo.jpeg" && wal -i "$wallpaper" -n && killall -SIGUSR2 waybar && wifi-manager --reload
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = /home/lucas/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini
wallpaperengine_folder = ~/.local/share/Steam/steamapps/workshop/content/431960
linux_wallpaperengine_clamp = clamp
linux_wallpaperengine_volume = 10
linux_wallpaperengine_silent = False
linux_wallpaperengine_noautomute = False
linux_wallpaperengine_no_audio_processing = False
linux_wallpaperengine_fps = 30
linux_wallpaperengine_disable_particles = True
linux_wallpaperengine_disable_mouse = False
linux_wallpaperengine_disable_parallax = False
linux_wallpaperengine_no_fullscreen_pause = False

